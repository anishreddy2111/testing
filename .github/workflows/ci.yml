name: CI

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: maven-build
        uses: actions/setup-java@v4
        with:
            distribution: 'temurin'
            java-version: '17'
      - run: mvn clean package




	


